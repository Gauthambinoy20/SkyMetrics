services:
  api:
    build: .
    image: skymetrics:latest
    command: uvicorn skymetrics.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    image: skymetrics:latest
    depends_on:
      - api
    command: >
      streamlit run src/skymetrics/dashboard/app.py
      --server.address 0.0.0.0 --server.port 8501
    volumes:
      - ./notebooks:/app/notebooks:ro
    ports:
      - "8501:8501"
